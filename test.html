<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TWSE CORS 測試</title>
<style>
  body{font-family:system-ui,"Noto Sans TC",sans-serif;max-width:680px;margin:40px auto;padding:0 20px;line-height:1.6;color:#1a1a1a}
  h1{font-size:20px}
  button{font-size:15px;padding:10px 18px;border:0;border-radius:8px;background:#14110F;color:#fff;cursor:pointer}
  #out{margin-top:20px;padding:16px;border-radius:10px;background:#f4f4f5;white-space:pre-wrap;font-family:"IBM Plex Mono",monospace;font-size:13px;border:1px solid #e4e4e7}
  .ok{color:#15875A;font-weight:600}
  .err{color:#D32F3C;font-weight:600}
  .url{font-family:monospace;font-size:12px;color:#666;word-break:break-all}
</style>
</head>
<body>
  <h1>TWSE OpenAPI CORS 測試</h1>
  <p>這支頁面會嘗試從你目前的網域，直接向證交所抓「全部上市個股當日成交」資料，並找出 0050。</p>
  <p class="url">GET https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL</p>
  <button id="run">開始測試</button>
  <div id="out">點上面的按鈕開始。</div>

<script>
  const out = document.getElementById('out');
  document.getElementById('run').addEventListener('click', async () => {
    out.textContent = '請求中…';
    try {
      const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
      if (!res.ok) { out.innerHTML = `<span class="err">HTTP 錯誤：${res.status}</span>`; return; }
      const data = await res.json();
      const total = Array.isArray(data) ? data.length : 0;

      // 找出 0050（欄位名稱可能是 Code 或中文鍵，兩種都試）
      const row = data.find(x => x.Code === '0050' || x['證券代號'] === '0050' || x.code === '0050');

      let msg = `<span class="ok">✅ CORS 通過。</span>\n`;
      msg += `這個網域可以直接撈 TWSE，不需要任何後端／資料庫。\n`;
      msg += `總共回傳 ${total} 筆資料。\n\n`;
      if (row) {
        msg += `找到 0050，原始欄位如下（照這些 key 名稱寫前端）：\n`;
        msg += JSON.stringify(row, null, 2);
      } else {
        msg += `⚠️ 沒在這支裡找到 0050（ETF 可能不在這支 endpoint）。\n`;
        msg += `第一筆資料長這樣，給你看欄位名稱：\n`;
        msg += JSON.stringify(data[0], null, 2);
      }
      out.innerHTML = msg;
    } catch (e) {
      out.innerHTML = `<span class="err">❌ 被擋了（很可能是 CORS）。</span>\n` +
        `錯誤訊息：${e.message}\n\n` +
        `代表這個網域不能直接撈 TWSE，需要加一層代理（例如 Google Apps Script）。`;
    }
  });
</script>
</body>
</html>
