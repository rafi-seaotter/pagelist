<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafi's Pages</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root {
    --ink: #1a1a2e;
    --paper: #faf9f6;
    --cream: #f0ede6;
    --accent: #c94040;
    --border: #d4cfc6;
    --ink-light: #3d3d5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    background: var(--ink);
    padding: 64px 40px 56px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,64,64,0.2) 0%, transparent 70%);
  }
  .header-inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 1; }
  .header-tag { display: inline-block; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 4px 12px; margin-bottom: 20px; }
  header h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(28px, 5vw, 44px); font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 12px; }
  header p { color: rgba(255,255,255,0.55); font-size: 14px; }

  main { max-width: 760px; margin: 0 auto; padding: 56px 24px; width: 100%; flex: 1; }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #aaa; margin-bottom: 20px; }

  .card-list { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px 28px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.09); transform: translateY(-1px); }
  .card-left { display: flex; align-items: flex-start; gap: 16px; }
  .card-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
  .card-title { font-family: 'Noto Serif TC', serif; font-size: 17px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.4; }
  .card-desc { font-size: 13px; color: var(--ink-light); line-height: 1.6; }
  .card-arrow { font-size: 18px; color: var(--accent); flex-shrink: 0; opacity: 0.6; transition: opacity 0.15s, transform 0.15s; }
  .card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  footer {
    text-align: center;
    padding: 32px;
    font-size: 12px;
    color: #bbb;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Rafi's Pages</div>
    <h1>歡迎</h1>
    <p>這裡收錄了各種整理中的頁面</p>
  </div>
</header>

<main>
  <p class="section-label">頁面列表</p>
  <div class="card-list">

    <a class="card" href="/ecommerce-tools">
      <div class="card-left">
        <div class="card-icon">🛒</div>
        <div>
          <div class="card-title">電商架站工具完整比較</div>
          <div class="card-desc">市面上 8 種架站工具，哪個最適合你？Pinzap、SHOPLINE、meepShop 等完整評比</div>
        </div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="/Ishigaki-Island">
      <div class="card-left">
        <div class="card-icon">🏝️</div>
        <div>
          <div class="card-title">石垣島攻略</div>
          <div class="card-desc">行程規劃、景點推薦與旅遊資訊整理</div>
        </div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>
</main>

<footer>
  Rafi's Pages
</footer>

</body>
</html>
